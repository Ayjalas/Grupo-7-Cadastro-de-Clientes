<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="menu-lateral" id="menu-lateral"></aside>
        <main class="conteudo">
            <div id="listagem">
                <h2><i class="fas fa-list"></i> Listagem de Clientes</h2>
                <div class="barra-ferramentas">
                    <input type="text" id="busca" placeholder="🔍 Buscar por nome...">
                    <button id="btn-novo-cadastro"><i class="fas fa-plus"></i> Novo Cadastro</button>
                </div>
                <!-- Div para mensagens de feedback (sem atrapalhar a tabela) -->
                <div id="msg-listagem" class="mensagem" style="display:none;"></div>
                <div id="tabela-clientes"></div>
            </div>
        </main>
    </div>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="menu.js"></script>
    <script src="clientes.js"></script>
    <script>
        carregarMenu();
        if (!sessionStorage.getItem('usuarioLogado')) {
            window.location.href = 'login.html';
        }
        carregarClientes();
        renderizarTabela();
        document.getElementById('busca').addEventListener('input', () => renderizarTabela());
        document.getElementById('btn-novo-cadastro').addEventListener('click', () => {
            window.location.href = 'cadastro.html';
        });
    </script>
</body>
</html>
