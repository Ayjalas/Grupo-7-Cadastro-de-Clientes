<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cliente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="menu-lateral" id="menu-lateral"></aside>
        <main class="conteudo">
            <div id="cadastro">
                <h2><i class="fas fa-user-plus"></i> Cadastro de Cliente</h2>
                <form id="form-cliente">
                    <input type="text" id="nome" placeholder="Nome *" required>
                    <input type="text" id="telefone" placeholder="Telefone *" required>
                    <input type="text" id="cidade" placeholder="Cidade (opcional)">
                    <input type="text" id="endereco" placeholder="Endereço (opcional)">
                    <input type="text" id="foto" placeholder="URL da foto do documento (opcional)">
                    <button type="submit"><i class="fas fa-save"></i> Salvar Cliente</button>
                </form>
                <div id="mensagem-cadastro" class="mensagem"></div>
            </div>
        </main>
    </div>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="menu.js"></script>
    <script src="clientes.js"></script>
    <script>
        carregarMenu();
        // Verifica se está logado (apenas sessionStorage)
        if (!sessionStorage.getItem('usuarioLogado')) {
            window.location.href = 'login.html';
        }
        document.getElementById('form-cliente').addEventListener('submit', cadastrarCliente);
    </script>
</body>
</html>
