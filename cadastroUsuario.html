<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="menu-lateral" id="menu-lateral"></aside>
        <main class="conteudo">
            <div id="cadastro-usuario-page">
                <h2><i class="fas fa-user-plus"></i> Cadastrar Novo Usuário</h2>
                <form id="form-cadastro-usuario">
                    <input type="text" id="novo-usuario" placeholder="Usuário" required>
                    <input type="password" id="nova-senha" placeholder="Senha" required>
                    <button type="submit"><i class="fas fa-save"></i> Cadastrar</button>
                </form>
                <div id="mensagem-cadastro-usuario" class="mensagem"></div>
                <p>Já tem conta? <a href="login.html">Faça login</a></p>
            </div>
        </main>
    </div>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="menu.js"></script>
    <script>
        carregarMenu();
        document.getElementById('form-cadastro-usuario').addEventListener('submit', cadastrarUsuario);
    </script>
</body>
</html>
