<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="menu-lateral" id="menu-lateral"></aside>
        <main class="conteudo">
            <div id="login">
                <h2><i class="fas fa-lock"></i> Login</h2>
                <form id="form-login">
                    <input type="text" id="login-usuario" placeholder="Usuário" required>
                    <input type="password" id="login-senha" placeholder="Senha" required>
                    <button type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
                </form>
                <p>Não tem cadastro? <a href="cadastroUsuario.html">Crie uma conta</a></p>
                <div id="mensagem-login" class="mensagem"></div>
            </div>
        </main>
    </div>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="menu.js"></script>
    <script>
        carregarMenu();
        document.getElementById('form-login').addEventListener('submit', fazerLogin);
    </script>
</body>
</html>
